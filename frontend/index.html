<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🚛 FRET</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link href="css/styles.css" rel="stylesheet">
  <link href="css/responsive.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-dark bg-dark-blue fixed-top px-3 d-flex align-items-center">
    <a class="navbar-brand fw-bold fs-4" href="#" onclick="navigate('dashboard')"><i class="bi bi-truck"></i> FRET</a>
    <div class="d-flex align-items-center gap-3">
      <span class="text-white-50 small d-none d-md-inline">🟢 Online</span>
      <span class="text-white small" id="relogio">--:--</span>
    </div>
  </nav>

  <div class="sidebar" id="sidebar">
    <button class="btn-sidebar active" onclick="navigate('dashboard')" data-page="dashboard"><i class="bi bi-speedometer2"></i> <span>Painel</span></button>
    <button class="btn-sidebar" onclick="navigate('mapa')" data-page="mapa"><i class="bi bi-geo-alt"></i> <span>Mapa</span></button>
    <button class="btn-sidebar" onclick="navigate('motoristas')" data-page="motoristas"><i class="bi bi-people"></i> <span>Motoristas</span></button>
    <button class="btn-sidebar" onclick="navigate('caminhoes')" data-page="caminhoes"><i class="bi bi-truck-front"></i> <span>Frota</span></button>
    <button class="btn-sidebar" onclick="navigate('rotas')" data-page="rotas"><i class="bi bi-map"></i> <span>Rotas</span></button>
    <button class="btn-sidebar" onclick="navigate('solicitacoes')" data-page="solicitacoes"><i class="bi bi-inbox"></i> <span>Solicitações</span></button>
    <button class="btn-sidebar" onclick="navigate('postos')" data-page="postos"><i class="bi bi-fuel-pump"></i> <span>Postos</span></button>
    <button class="btn-sidebar" onclick="navigate('financeiro')" data-page="financeiro"><i class="bi bi-cash-coin"></i> <span>Financeiro</span></button>
  </div>

  <div class="mobile-nav" id="mobileNav">
    <button class="btn-mobile-nav active" onclick="navigate('dashboard')" data-page="dashboard"><i class="bi bi-speedometer2 fs-5"></i><span>Painel</span></button>
    <button class="btn-mobile-nav" onclick="navigate('mapa')" data-page="mapa"><i class="bi bi-geo-alt fs-5"></i><span>Mapa</span></button>
    <button class="btn-mobile-nav" onclick="navigate('motoristas')" data-page="motoristas"><i class="bi bi-people fs-5"></i><span>Motoristas</span></button>
    <button class="btn-mobile-nav" onclick="navigate('rotas')" data-page="rotas"><i class="bi bi-map fs-5"></i><span>Rotas</span></button>
  </div>

  <div class="main-content" id="mainContent"><div id="pageContent"></div></div>
  <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastContainer"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/app.js"></script>
  <script src="js/pages/mapa.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/motoristas.js"></script>
  <script src="js/pages/caminhoes.js"></script>
  <script src="js/pages/rotas.js"></script>
  <script src="js/pages/solicitacoes.js"></script>
  <script src="js/pages/postos.js"></script>
  <script src="js/pages/financeiro.js"></script>
