name: Sync Frontend to gh-pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'package.json'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy frontend to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./frontend
          publish_branch: gh-pages
          force_orphan: true
          commit_message: "🚀 Deploy automático [skip ci]"